<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Elite Parches Tácticos</title>
  <!-- Tipografía futurista -->
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Aldrich', Arial, sans-serif;
      background: #2f3e46;
      color: #e0e1dd;
      margin: 0;
      padding: 0;
      font-size: 16px;
    }
    header {
      padding: 20px;
      text-align: center;
    }
    header img {
      width: 300px;
      max-width: 100%;
      height: auto;
    }
    .catalogo {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }
    .producto {
      background: #354f52;
      border: 1px solid #52796f;
      border-radius: 12px;
      margin: 10px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      width: 95%;
    }
    .producto:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.6);
    }
    .producto img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .producto h2 {
      color: #cad2c5;
      font-size: 22px;
      margin: 10px 0;
    }
    .producto p {
      font-size: 16px;
      color: #e0e1dd;
    }
    .producto strong {
      color: #f4a261;
      font-size: 18px;
    }
    button {
      background: #2a9d8f;
      border: none;
      padding: 14px 20px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #21867a;
    }
    #carrito {
      background: #354f52;
      border: 1px solid #52796f;
      border-radius: 12px;
      margin: 20px;
      padding: 20px;
      max-width: 600px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }
    #carrito h2 {
      color: #cad2c5;
      margin-bottom: 10px;
    }
    #lista-carrito {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #lista-carrito li {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      font-size: 16px;
    }
    #lista-carrito button {
      background: #f4a261;
      color: #2f3e46;
      font-size: 14px;
      padding: 4px 8px;
      margin-left: 10px;
    }
    #lista-carrito button:hover {
      background: #e76f51;
      color: white;
    }
    @media (min-width: 768px) {
      .producto {
        flex-direction: row;
        align-items: center;
        text-align: left;
        width: 600px;
      }
      .producto img {
        width: 220px;
        margin-right: 20px;
        margin-bottom: 0;
      }
    }
    @media (max-width: 600px) {
      header img {
        width: 220px;
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="https://i.postimg.cc/bvxNYmhC/ELITE-PERFIL-GRIS-blanco-logo-transparente-150x150.png" alt="Logo Elite Parches Tácticos">
    <p>Fábrica de parches tácticos en PVC, al mayor y detal</p>
  </header>

  <div id="catalogo" class="catalogo"></div>

  <div id="carrito">
    <h2>🛒 Carrito</h2>
    <ul id="lista-carrito"></ul>
    <p><strong>Total: $<span id="total">0</span></strong></p>
    <button onclick="finalizarCompra()">Enviar cuenta de cobro</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaM97uLBVGb8lkUfgKMLrt4ihN1RwidfEcawJ59FxseTdfZJls83ygTs2zMKsGT_vcNsMj8cpzilnr/pub?gid=0&single=true&output=csv";
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTDsNwpNUqVdvthK4zLOqiYh_Kdk6nukk7BWc3tTzcJVJ2SamKRL4TlnmH6drmhXYnlA/exec";
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    Papa.parse(URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const productos = results.data;
        let html = "";
        productos.forEach(prod => {
          if (!prod.Nombre) return;
          html += `
            <div class="producto">
              <img src="${prod.Imagen}" alt="${prod.Nombre}">
              <div>
                <h2>${prod.Nombre}</h2>
                <p>${prod.Descripcion}</p>
                <p><strong>$${prod.Precio}</strong></p>
                <button onclick="agregarAlCarrito('${prod.Nombre}', ${prod.Precio})">Añadir al carrito</button>
              </div>
            </div>
          `;
        });
        document.getElementById("catalogo").innerHTML = html || "<p>No hay productos disponibles.</p>";
        actualizarCarrito();
      }
    });

    function agregarAlCarrito(nombre, precio) {
      const productoExistente = carrito.find(p => p.nombre === nombre);
      if (productoExistente) {
        productoExistente.cantidad++;
      } else {
        carrito.push({ nombre, precio, cantidad: 1 });
      }
      actualizarCarrito();
    }

    function eliminarDelCarrito(nombre) {
      carrito = carrito.filter(p => p.nombre !== nombre);
      actualizarCarrito();
    }

    function actualizarCarrito() {
      const lista = document.getElementById("lista-carrito");
      lista.innerHTML = "";
      let total = 0;
      carrito.forEach(item => {
        total += item.precio * item.cantidad;
        lista.innerHTML += `
          <li>
            ${item.nombre} - $${item.precio} x ${item.cantidad}
            <button onclick="eliminarDelCarrito('${item.nombre}')">Eliminar</button>
          </li>
        `;
      });
      document.getElementById("total").textContent = total.toFixed(2);
      localStorage.setItem("carrito", 
                           
    /* 🧾 Generar código único de factura con numeración desde 16 */
    function generarCodigoFactura() {
      const fecha = new Date();
      // Historial de facturas guardadas en localStorage
      let historial = JSON.parse(localStorage.getItem("facturas")) || [];
      // La numeración empieza desde 16
      let numeroFactura = 16 + historial.length;

      // Timestamp para asegurar unicidad
      const timestamp = fecha.getFullYear().toString() +
                        (fecha.getMonth()+1).toString().padStart(2,"0") +
                        fecha.getDate().toString().padStart(2,"0") +
                        fecha.getHours().toString().padStart(2,"0") +
                        fecha.getMinutes().toString().padStart(2,"0") +
                        fecha.getSeconds().toString().padStart(2,"0");

      return "FAC-" + numeroFactura + "-" + timestamp;
    }

    /* ✅ Finalizar compra */
    function finalizarCompra() {
      if (carrito.length === 0) {
        alert("Tu carrito está vacío.");
        return;
      }

      const codigo = generarCodigoFactura();
      let total = 0;
      let mensaje = "🧾 *Cuenta de Cobro - Elite Parches Tácticos*\n";
      mensaje += `Código: ${codigo}\nRUT: 700214612\n\n`;

      carrito.forEach(p => {
        const subtotal = p.precio * p.cantidad;
        total += subtotal;
        mensaje += `• ${p.nombre} x${p.cantidad} = $${subtotal.toFixed(2)}\n`;
      });

      mensaje += `\nTotal a pagar: $${total.toFixed(2)}\n\n`;
      mensaje += "Cancela tus productos a Breb-b 0091706533.\n";
      mensaje += "Tu pedido dependiendo de la cantidad de parches se estaría enviando en el transcurso de 3 a 5 días hábiles.\n";
      mensaje += "Si tienes dudas déjanos tu mensaje en esta conversación de WhatsApp.\n\n";
      mensaje += "Gracias por tu compra 🙌";

      // Guardar en Google Sheets (solo datos de la factura)
      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ codigo: codigo, productos: carrito, total: total }),
        headers: { "Content-Type": "application/json" }
      }).then(res => console.log("Factura guardada en Google Sheets"));

      // Guardar también en localStorage para llevar control de numeración
      let historial = JSON.parse(localStorage.getItem("facturas")) || [];
      historial.push({ codigo: codigo, productos: carrito, total: total, fecha: new Date().toLocaleString() });
      localStorage.setItem("facturas", JSON.stringify(historial));

      // Enviar a WhatsApp
      const numero = "573153334129";
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
    }
  </script>

</body>
</html>
