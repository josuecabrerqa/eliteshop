<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Elite Parches Tácticos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #2f3e46;
      color: #e0e1dd;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
    }

    h1 {
      color: #84a98c;
      margin: 10px 0;
    }

    p {
      margin: 5px 0;
    }

    .catalogo {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .producto {
      background: #354f52;
      border: 1px solid #52796f;
      padding: 15px;
      margin: 15px;
      border-radius: 10px;
      width: 600px; /* más ancho para horizontal */
      box-sizing: border-box;
      display: flex;          /* 👈 clave: horizontal */
      align-items: center;    /* centra verticalmente */
      text-align: left;
    }

    .producto img {
      width: 200px;           /* tamaño fijo imagen */
      border-radius: 10px;
      margin-right: 15px;     /* espacio entre imagen y texto */
    }

    .producto h2 {
      color: #cad2c5;
      font-size: 18px;
      margin: 10px 0;
    }

    .producto p {
      font-size: 14px;
    }

    .producto strong {
      color: #f4a261;
    }

    button {
      background: #2a9d8f;
      border: none;
      padding: 10px 15px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
    }

    button:hover {
      background: #21867a;
    }

    /* Responsive: en pantallas pequeñas vuelve vertical */
    @media (max-width: 700px) {
      .producto {
        flex-direction: column;
        width: 90%;
        text-align: center;
      }

      .producto img {
        width: 100%;
        margin: 0 0 15px 0;
      }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <header>
    <img src="https://i.postimg.cc/bvxNYmhC/ELITE-PERFIL-GRIS-blanco-logo-transparente-150x150.png" width="333" alt="Logo Elite Parches Tácticos">
    <p>Fábrica de parches tácticos en PVC, al mayor y detal</p>
  </header>

  <div id="catalogo" class="catalogo"></div>

  <!-- PapaParse desde CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <script>
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTaM97uLBVGb8lkUfgKMLrt4ihN1RwidfEcawJ59FxseTdfZJls83ygTs2zMKsGT_vcNsMj8cpzilnr/pub?gid=0&single=true&output=csv";

    Papa.parse(URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const productos = results.data;
        let html = "";

        productos.forEach(prod => {
          if (!prod.Nombre) return;

          html += `
            <div class="producto">
              <img src="${prod.Imagen}" alt="${prod.Nombre}">
              <div>
                <h2>${prod.Nombre}</h2>
                <p>${prod.Descripcion}</p>
                <p><strong>$${prod.Precio}</strong></p>
                <button onclick="comprar('${prod.Nombre}')">Comprar</button>
              </div>
            </div>
          `;
        });

        document.getElementById("catalogo").innerHTML = html || "<p>No hay productos disponibles.</p>";
      },
      error: function(err) {
        document.getElementById("catalogo").innerHTML = "<p>Error al cargar productos.</p>";
        console.error("Error PapaParse:", err);
      }
    });

    function comprar(producto) {
      const numero = "573001234567";
      const mensaje = `Hola, quiero comprar: ${producto}`;
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`);
    }
  </script>

</body>
</html>
